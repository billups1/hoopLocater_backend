# .github/workflows/deploy.yml

name: Java CI/CD - OCI SSH 배포

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 자바 환경 설정
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 프로젝트 빌드 (JAR 파일 생성)
      - name: Build Project (Gradle/Maven)
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      # 4. SSH로 빌드된 JAR 파일 전송
      # OCI 인스턴스의 /tmp 디렉토리에 JAR 파일을 전송합니다.
      - name: Transfer New JAR to OCI Instance
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'build/libs/HoopLocater-0.0.1-SNAPSHOT.jar'.
          target: '/tmp' # 임시 디렉토리

      # 5. OCI 인스턴스에 접속하여 기존 프로세스 종료 및 스크립트 실행
      - name: Execute Deployment Script on OCI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            APP_JAR_NAME="HoopLocater-0.0.1-SNAPSHOT.jar"
            FINAL_APP_PATH="/home/opc/app"
            
            # 1. 기존 자바 프로세스 종료
            # start.sh로 실행된 이전 애플리케이션을 찾아서 종료합니다.
            PID=$(ps -ef | grep $APP_JAR_NAME | grep -v grep | awk '{print $2}')
            if [ ! -z "$PID" ]; then
              kill -9 $PID
              echo "Killed old Java process $PID"
            fi

            # 2. 새 JAR 파일을 최종 경로로 이동 및 덮어쓰기
            mkdir -p $FINAL_APP_PATH # 디렉토리가 없으면 생성
            mv /tmp/$APP_JAR_NAME $FINAL_APP_PATH/$APP_JAR_NAME
            echo "New JAR moved to $FINAL_APP_PATH"

            # 3. /home/app/start.sh 스크립트 실행 (사용자 요청)
            nohup /home/opc/app/start.sh > /home/opc/app/app.log 2>&1 &
            echo "Application restarted via /home/app/start.sh"